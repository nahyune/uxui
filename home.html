<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- PWA: 홈 화면 추가 시 전체화면 실행 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MOTIMO">
  <link rel="apple-touch-icon" href="img/icon-180.png">
  <title>MOTIMO - 홈</title>
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&display=swap" />
</head>
<body>
<div class="phone">

  <!-- 스크롤 래퍼 -->
  <div class="scroll-wrap">

    <!-- 상단 그린 영역 -->
    <div class="top-zone">

      <!-- 상태 여백 -->
      <div class="status-bar"></div>

      <!-- 앱 헤더 -->
      <div class="app-header">
        <span class="logo">MOTIMO</span>
        <a href="notification.html" class="bell-btn" aria-label="알림">
          <img src="img/notification.JPG" alt="알림" width="34" height="34">
        </a>
      </div>

    </div><!-- /top-zone -->

    <!-- 흰색 메인 영역 -->
    <main class="main-scroll">

      <!-- 절약 금액 -->
      <section class="savings-section">
        <p class="savings-label">이번 주 절약 금액</p>
        <p class="savings-amount">54,300원</p>
        <span class="savings-badge">저번 주보다 12% 더 아꼈어요!</span>
      </section>

      <!-- CTA 버튼 -->
      <div class="cta-wrap">
        <button class="cta-btn" onclick="location.href='check.html'">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
            <line x1="13" y1="4" x2="13" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="4" y1="13" x2="22" y2="13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          오늘 소비 체크하기
        </button>
      </div>

      <!-- 인기 챌린지 섹션 -->
      <section class="challenge-section">
        <h2 class="section-title">지금 인기 챌린지 🔥</h2>

        <!-- 카드 1 -->
        <article class="challenge-card" onclick="location.href='challenge-detail.html'">
          <div class="challenge-thumb"></div>
          <div class="challenge-info">
            <p class="challenge-name">쇼핑 금지 챌린지 🛍️</p>
            <span class="participant-badge">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                   stroke="#E16500" stroke-width="2" stroke-linecap="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              52명이 함께하고 있어요!
            </span>
            <p class="challenge-meta">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                   stroke="#434343" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              1일 1회 소비 체크
            </p>
            <p class="challenge-meta">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                   stroke="#434343" stroke-width="2" stroke-linecap="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              26.04.06(월) ~ 04.27(월)
            </p>
          </div>
        </article>

        <div class="card-divider"></div>

        <!-- 카드 2 -->
        <article class="challenge-card" onclick="location.href='challenge-detail.html'">
          <div class="challenge-thumb"></div>
          <div class="challenge-info">
            <p class="challenge-name">하루 1만원 챌린지 💸</p>
            <span class="participant-badge">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                   stroke="#E16500" stroke-width="2" stroke-linecap="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              63명이 함께하고 있어요!
            </span>
            <p class="challenge-meta">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                   stroke="#434343" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              1일 1회 소비 체크
            </p>
            <p class="challenge-meta">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                   stroke="#434343" stroke-width="2" stroke-linecap="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              26.04.06(월) ~ 04.27(월)
            </p>
          </div>
        </article>

        <div class="card-divider"></div>

        <!-- 카드 3 -->
        <article class="challenge-card" onclick="location.href='challenge-detail.html'">
          <div class="challenge-thumb"></div>
          <div class="challenge-info">
            <p class="challenge-name">집밥 챌린지 🍳</p>
            <span class="participant-badge">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                   stroke="#E16500" stroke-width="2" stroke-linecap="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              45명이 함께하고 있어요!
            </span>
            <p class="challenge-meta">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                   stroke="#434343" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              1일 1회 소비 체크
            </p>
            <p class="challenge-meta">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                   stroke="#434343" stroke-width="2" stroke-linecap="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              26.04.06(월) ~ 04.27(월)
            </p>
          </div>
        </article>

      </section>
    </main>

  </div><!-- /scroll-wrap -->

  <!-- 하단 네비게이션 -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item active">
      <img class="nav-icon" src="img/home_02.JPG" alt="홈">
      <span>홈</span>
    </a>
    <a href="check.html" class="nav-item">
      <img class="nav-icon" src="img/check.JPG" alt="소비체크">
      <span>소비체크</span>
    </a>
    <a href="challenge.html" class="nav-item">
      <img class="nav-icon" src="img/challenge.JPG" alt="챌린지">
      <span>챌린지</span>
    </a>
    <a href="chat.html" class="nav-item">
      <img class="nav-icon" src="img/chatting.JPG" alt="채팅">
      <span>채팅</span>
    </a>
    <a href="my.html" class="nav-item">
      <img class="nav-icon" src="img/mypage.JPG" alt="마이">
      <span>마이</span>
    </a>
  </nav>

  <!-- iOS 홈 인디케이터 -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
