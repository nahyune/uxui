<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MOTIMO">
  <link rel="apple-touch-icon" href="img/icon-180.png">
  <title>MOTIMO - 홈</title>
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&display=swap" />
</head>
<body>
<div class="phone">

  <!-- ① 상태바 고정 (flex-shrink:0) — MOTIMO 없음 -->
  <div class="status-frame">
    <div class="status-bar"></div>
  </div>

  <!-- ② 메인 스크롤 (flex:1) — MOTIMO + 흰색 콘텐츠 함께 스크롤 -->
  <div class="main-scroll">

    <!-- MOTIMO 헤더 — 스크롤 시 위로 올라감 -->
    <div class="top-zone">
      <div class="app-header">
        <span class="logo">MOTIMO</span>
        <button class="bell-btn" aria-label="알림">
          <svg width="24" height="27" viewBox="0 0 24 27" fill="white">
            <path d="M12 0C11.1 0 10.5 0.7 10.5 1.6C7.2 2.5 5.5 5.2 5.5 8.5V20H3V22H21V20H18.5V8.5C18.5 5.2 16.8 2.5 13.5 1.6C13.5 0.7 12.9 0 12 0Z"/>
            <ellipse cx="12" cy="25" rx="2.8" ry="2"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 흰색 영역 (라운드 상단) -->
    <div class="white-wrap">

      <!-- 히어로 섹션 -->
      <div class="hero">

        <div class="hero-cat">
          <img src="img/home_cat.png" alt="">
        </div>

        <img src="img/home_talk.png" class="savings-talk" alt="">

        <div class="money-bubble">
          <div class="money-content">
            <p class="money-label">이번 주 절약 금액</p>
            <p class="money-amount">54,300원</p>
          </div>
        </div>

        <a href="check.html" class="check-pill">
          <p class="check-pill-title">오늘 지출은 어땠나요?</p>
          <p class="check-pill-sub">소비 체크하러 가기!</p>
        </a>

        <a href="check.html" class="cta-btn">
          <img src="img/check_plus.png" class="cta-plus" alt="">
          오늘 소비 체크하기
        </a>

      </div><!-- /hero -->

      <!-- 인기 챌린지 섹션 -->
      <section class="challenge-section">
        <div class="section-title-wrap">
          <h2 class="section-title">지금 인기 챌린지 🔥</h2>
        </div>

        <div class="challenge-list">

          <article class="challenge-card" onclick="location.href='challenge-detail.html'">
            <div class="challenge-thumb">
              <img src="img/home_shopping.png" alt="쇼핑 금지 챌린지">
            </div>
            <div class="challenge-info">
              <p class="challenge-name">쇼핑 금지 챌린지 🛍</p>
              <div class="challenge-inner">
                <div class="participant-badge">
                  <svg width="10" height="9" viewBox="0 0 10 9" fill="none">
                    <path d="M6.8 8.5v-.8a1.8 1.8 0 0 0-1.8-1.8H2a1.8 1.8 0 0 0-1.8 1.8v.8" stroke="#E16500" stroke-width="1.2" stroke-linecap="round"/>
                    <circle cx="3.5" cy="2.8" r="1.8" stroke="#E16500" stroke-width="1.2"/>
                    <path d="M9.8 8.5v-.8A1.8 1.8 0 0 0 8.6 6.1" stroke="#E16500" stroke-width="1.2" stroke-linecap="round"/>
                    <path d="M6.8 1.1a1.8 1.8 0 0 1 0 3.4" stroke="#E16500" stroke-width="1.2" stroke-linecap="round"/>
                  </svg>
                  <span class="badge-text">52명이 함께하고 있어요!</span>
                </div>
                <div class="challenge-meta-list">
                  <div class="challenge-meta">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                      <circle cx="7.5" cy="7.5" r="6" stroke="#686868" stroke-width="1.3"/>
                      <polyline points="5,7.5 6.8,9.3 10.5,5.5" stroke="#686868" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>1일 1회 소비 체크</span>
                  </div>
                  <div class="challenge-meta">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                      <rect x="1.5" y="2.5" width="12" height="11" rx="1.5" stroke="#686868" stroke-width="1.3"/>
                      <line x1="1.5" y1="6.5" x2="13.5" y2="6.5" stroke="#686868" stroke-width="1.3"/>
                      <line x1="5" y1="1.5" x2="5" y2="4" stroke="#686868" stroke-width="1.3" stroke-linecap="round"/>
                      <line x1="10" y1="1.5" x2="10" y2="4" stroke="#686868" stroke-width="1.3" stroke-linecap="round"/>
                    </svg>
                    <span>26.04.06(월) ~ 04.27(월)</span>
                  </div>
                </div>
              </div>
            </div>
          </article>

          <div class="card-divider"></div>

          <article class="challenge-card" onclick="location.href='challenge-detail.html'">
            <div class="challenge-thumb">
              <img src="img/home_money.png" alt="하루 만원 챌린지">
            </div>
            <div class="challenge-info">
              <p class="challenge-name">하루 만원 챌린지 💸</p>
              <div class="challenge-inner">
                <div class="participant-badge">
                  <svg width="10" height="9" viewBox="0 0 10 9" fill="none">
                    <path d="M6.8 8.5v-.8a1.8 1.8 0 0 0-1.8-1.8H2a1.8 1.8 0 0 0-1.8 1.8v.8" stroke="#E16500" stroke-width="1.2" stroke-linecap="round"/>
                    <circle cx="3.5" cy="2.8" r="1.8" stroke="#E16500" stroke-width="1.2"/>
                    <path d="M9.8 8.5v-.8A1.8 1.8 0 0 0 8.6 6.1" stroke="#E16500" stroke-width="1.2" stroke-linecap="round"/>
                    <path d="M6.8 1.1a1.8 1.8 0 0 1 0 3.4" stroke="#E16500" stroke-width="1.2" stroke-linecap="round"/>
                  </svg>
                  <span class="badge-text">63명이 함께하고 있어요!</span>
                </div>
                <div class="challenge-meta-list">
                  <div class="challenge-meta">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                      <circle cx="7.5" cy="7.5" r="6" stroke="#686868" stroke-width="1.3"/>
                      <polyline points="5,7.5 6.8,9.3 10.5,5.5" stroke="#686868" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>1일 1회 소비 체크</span>
                  </div>
                  <div class="challenge-meta">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                      <rect x="1.5" y="2.5" width="12" height="11" rx="1.5" stroke="#686868" stroke-width="1.3"/>
                      <line x1="1.5" y1="6.5" x2="13.5" y2="6.5" stroke="#686868" stroke-width="1.3"/>
                      <line x1="5" y1="1.5" x2="5" y2="4" stroke="#686868" stroke-width="1.3" stroke-linecap="round"/>
                      <line x1="10" y1="1.5" x2="10" y2="4" stroke="#686868" stroke-width="1.3" stroke-linecap="round"/>
                    </svg>
                    <span>26.04.10(월) ~ 04.27(월)</span>
                  </div>
                </div>
              </div>
            </div>
          </article>

          <div class="card-divider"></div>

          <article class="challenge-card" onclick="location.href='challenge-detail.html'">
            <div class="challenge-thumb">
              <img src="img/home_rice.png" alt="집밥 챌린지">
            </div>
            <div class="challenge-info">
              <p class="challenge-name">집밥 챌린지 🍳</p>
              <div class="challenge-inner">
                <div class="participant-badge">
                  <svg width="10" height="9" viewBox="0 0 10 9" fill="none">
                    <path d="M6.8 8.5v-.8a1.8 1.8 0 0 0-1.8-1.8H2a1.8 1.8 0 0 0-1.8 1.8v.8" stroke="#E16500" stroke-width="1.2" stroke-linecap="round"/>
                    <circle cx="3.5" cy="2.8" r="1.8" stroke="#E16500" stroke-width="1.2"/>
                    <path d="M9.8 8.5v-.8A1.8 1.8 0 0 0 8.6 6.1" stroke="#E16500" stroke-width="1.2" stroke-linecap="round"/>
                    <path d="M6.8 1.1a1.8 1.8 0 0 1 0 3.4" stroke="#E16500" stroke-width="1.2" stroke-linecap="round"/>
                  </svg>
                  <span class="badge-text">45명이 함께하고 있어요!</span>
                </div>
                <div class="challenge-meta-list">
                  <div class="challenge-meta">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                      <circle cx="7.5" cy="7.5" r="6" stroke="#686868" stroke-width="1.3"/>
                      <polyline points="5,7.5 6.8,9.3 10.5,5.5" stroke="#686868" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>1일 1회 소비 체크</span>
                  </div>
                  <div class="challenge-meta">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                      <rect x="1.5" y="2.5" width="12" height="11" rx="1.5" stroke="#686868" stroke-width="1.3"/>
                      <line x1="1.5" y1="6.5" x2="13.5" y2="6.5" stroke="#686868" stroke-width="1.3"/>
                      <line x1="5" y1="1.5" x2="5" y2="4" stroke="#686868" stroke-width="1.3" stroke-linecap="round"/>
                      <line x1="10" y1="1.5" x2="10" y2="4" stroke="#686868" stroke-width="1.3" stroke-linecap="round"/>
                    </svg>
                    <span>26.04.06(월) ~ 04.27(월)</span>
                  </div>
                </div>
              </div>
            </div>
          </article>

        </div>
      </section>

    </div><!-- /white-wrap -->
  </div><!-- /main-scroll -->

  <!-- ③ 하단 네비게이션 (고정) -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item active">
      <span class="nav-icon-wrap"><img src="img/home_02.png" class="nav-icon-home" alt="홈"></span>
      <span class="nav-label">홈</span>
    </a>
    <a href="check.html" class="nav-item">
      <span class="nav-icon-wrap"><img src="img/check.png" class="nav-icon-check" alt="소비체크"></span>
      <span class="nav-label">소비체크</span>
    </a>
    <a href="challenge.html" class="nav-item">
      <span class="nav-icon-wrap"><img src="img/challenge.png" class="nav-icon-challenge" alt="챌린지"></span>
      <span class="nav-label">챌린지</span>
    </a>
    <a href="chat.html" class="nav-item">
      <span class="nav-icon-wrap"><img src="img/chatting.png" class="nav-icon-chat" alt="채팅"></span>
      <span class="nav-label">채팅</span>
    </a>
    <a href="my.html" class="nav-item">
      <span class="nav-icon-wrap"><img src="img/mypage.png" class="nav-icon-my" alt="마이"></span>
      <span class="nav-label">마이</span>
    </a>
  </nav>

  <div class="home-indicator"></div>

</div>
</body>
</html>
