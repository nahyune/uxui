<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>MOTIMO OG Image</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #ffffff;
    }

    .og-wrap {
      width: 1200px;
      height: 630px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cat-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center 20%;
      transform: scale(1.3) translateY(-6%);
    }
  </style>
</head>
<body>
<div class="og-wrap">
  <img class="cat-img" src="img/og-cat.png" alt="MOTIMO 마스코트" />
</div>
</body>
</html>
