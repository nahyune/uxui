<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MOA">
  <link rel="apple-touch-icon" href="img/icon-180.png">
  <title>MOA - 무지출 챌린지</title>
  <link rel="stylesheet" href="css/challenge-detail.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
<div class="phone">

  <!-- 상태바 (초록 배경) -->
  <div class="status-bar"></div>

  <!-- 메인 스크롤 -->
  <main class="detail-scroll">

    <!-- 히어로 영역 (초록 배경 #CBEB8D) -->
    <div class="detail-hero">

      <!-- 헤더: 뒤로가기 + 공유 -->
      <div class="detail-header">
        <a href="challenge.html" class="back-btn" aria-label="뒤로가기">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
               stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </a>
        <button class="share-btn" aria-label="공유">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
        </button>
      </div>

      <!-- 챌린지 이미지 — 피그마: w-262 h-218 centered -->
      <div class="detail-hero-img-wrap">
        <img src="img/Challenge Details_01.png" class="detail-hero-img" alt="무지출 챌린지">
      </div>

    </div><!-- /detail-hero -->

    <!-- 콘텐츠 영역 (gray bg #F2F2F2, rounded top) -->
    <div class="detail-content">

      <!-- 챌린지 이름 카드 (흰색) -->
      <div class="detail-name-card">

        <!-- 타이틀 — 피그마: 20px SemiBold -->
        <h1 class="detail-title">무지출 챌린지 💸</h1>

        <!-- 구분선 -->
        <div class="detail-divider"></div>

        <!-- 메타 정보 -->
        <div class="detail-meta">

          <!-- 조건 행 -->
          <div class="detail-meta-row">
            <img src="img/challenge_check.png" class="meta-icon meta-icon-check" alt="">
            <span class="meta-label">조건</span>
            <span class="meta-value">1일 1회 소비 체크</span>
          </div>

          <!-- 기간 행 -->
          <div class="detail-meta-row">
            <img src="img/calendar.png" class="meta-icon meta-icon-cal" alt="">
            <span class="meta-label">기간</span>
            <span class="meta-value">26.04.06(월) ~ 04.27(월)</span>
            <span class="period-badge">5일간</span>
          </div>

        </div><!-- /detail-meta -->

        <!-- 참여자 배지 — 피그마: bg-#EFF6E2 14px SemiBold #649900 -->
        <div class="participant-badge">
          <img src="img/person_02.png" class="participant-icon" alt="">
          총 23명이 함께하고 있어요!
        </div>

      </div><!-- /detail-name-card -->

      <!-- 챌린지 소개 섹션 -->
      <section class="detail-intro">
        <h2 class="intro-title">챌린지 소개</h2>
        <div class="intro-box">
          <p class="intro-text">
            "오늘 하루, 돈 안 쓰고 버텨볼까요? 💸<br>
            혼자면 어렵지만, 같이 하면 생각보다<br>
            할 만해요 👀"
          </p>
        </div>
      </section>

    </div><!-- /detail-content -->

  </main>

  <!-- 하단 CTA (검정 작대기 없음) -->
  <div class="detail-bottom">
    <button class="detail-cta">챌린지 참여하기</button>
  </div>

</div>
</body>
</html>
