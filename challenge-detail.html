<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- PWA: 홈 화면 추가 시 전체화면 실행 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MOA">
  <link rel="apple-touch-icon" href="img/icon-180.png">
  <title>MOA - 무지출 챌린지</title>
  <link rel="stylesheet" href="css/challenge-detail.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
<div class="phone">

  <!-- 고정 헤더 -->
  <div class="sticky-header">

    <!-- 상태 여백 -->
    <div class="status-bar"></div>

    <!-- 네비 헤더 -->
    <div class="nav-header">
      <a href="challenge.html" class="back-btn" aria-label="뒤로가기">
        <svg width="10" height="18" viewBox="0 0 10 18" fill="none"
             stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 1 1 9 9 17"/>
        </svg>
      </a>
      <button class="share-btn" aria-label="공유">
        <svg width="18" height="22" viewBox="0 0 18 22" fill="none"
             stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10V18a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V10"/>
          <polyline points="12 5 9 2 6 5"/>
          <line x1="9" y1="2" x2="9" y2="14"/>
        </svg>
      </button>
    </div>

  </div><!-- /sticky-header -->

  <!-- 스크롤 영역 -->
  <div class="scroll-body">

    <!-- 이미지 플레이스홀더 -->
    <div class="hero-img"></div>

    <!-- 챌린지 정보 카드 -->
    <div class="info-card">

      <h1 class="challenge-title">무지출 챌린지 💸</h1>

      <hr class="divider">

      <div class="info-rows">

        <div class="info-row">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="#686868" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span class="info-label">조건</span>
          <span class="info-value">1일 1회 소비 체크</span>
        </div>

        <div class="info-row">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="#686868" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span class="info-label">기간</span>
          <span class="info-value">26.04.06(월) ~ 04.27(월)</span>
          <span class="duration-badge">5일간</span>
        </div>

      </div>

      <div class="participant-badge">
        <svg width="15" height="13" viewBox="0 0 24 20" fill="none"
             stroke="#649900" stroke-width="2" stroke-linecap="round">
          <path d="M17 19v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 19v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        총 23명이 함께하고 있어요!
      </div>

    </div><!-- /info-card -->

    <!-- 챌린지 소개 -->
    <div class="intro-section">
      <h2 class="intro-title">챌린지 소개</h2>
      <div class="intro-card">
        <p class="intro-text">
          "오늘 하루, 돈 안 쓰고 버텨볼까요? 💸<br>
          혼자면 어렵지만, 같이 하면 생각보다<br>
          할 만해요 👀"
        </p>
      </div>
    </div>

    <!-- CTA 높이만큼 여백 -->
    <div class="cta-spacer"></div>

  </div><!-- /scroll-body -->

  <!-- 고정 하단 CTA -->
  <div class="cta-area">
    <button class="cta-btn" id="ctaBtn">챌린지 참여하기</button>
    <div class="home-indicator"></div>
  </div>

</div><!-- /phone -->
<script src="challenge-detail.js"></script>
</body>
</html>
