<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- PWA: 홈 화면 추가 시 전체화면 실행 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MOTIMO">
  <link rel="apple-touch-icon" href="img/icon-180.png">
  <title>MOTIMO - 설정 (카페 금지 챌린지)</title>
  <link rel="stylesheet" href="css/setting-challenge.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
<div class="phone">

  <!-- ── 헤더 ── -->
  <div class="chat-header">
    <div class="status-bar"></div>
    <div class="header-nav">
      <div class="header-left">
        <a href="chatting-challenge.html" class="back-btn" aria-label="뒤로가기">
          <svg width="10" height="18" viewBox="0 0 10 18" fill="none"
               stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 1 1 9 9 17"/>
          </svg>
        </a>
        <span class="page-title">설정</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" aria-label="알림">
          <svg width="21" height="23" viewBox="0 0 24 26" fill="none"
               stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
        <button class="icon-btn" aria-label="설정">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>
  </div><!-- /chat-header -->

  <!-- ── 스크롤 영역 ── -->
  <div class="scroll-body">

    <!-- ── 프로필 + CTA ── -->
    <div class="profile-section">
      <div class="profile-avatar"></div>
      <span class="profile-name">카페 금지 챌린지 ☕</span>
    </div>

    <div class="cta-wrap">
      <a href="new-challenge.html" class="cta-btn">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"
             stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <line x1="14" y1="5" x2="14" y2="23"/>
          <line x1="5" y1="14" x2="23" y2="14"/>
        </svg>
        챌린지 추가하기
      </a>
    </div>

    <!-- ── 나의 소비 기록 ── -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-header-left">
          <svg width="20" height="22" viewBox="0 0 20 24" fill="none"
               stroke="#F69A21" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 3h12a1 1 0 0 1 1 1v16l-7-4-7 4V4a1 1 0 0 1 1-1z"/>
          </svg>
          <span class="section-title">나의 소비 기록</span>
        </div>
        <a href="#" class="section-more">전체보기 ›</a>
      </div>

      <div class="spending-slider" id="spendingSlider">

        <!-- 카드 1 -->
        <div class="spending-card">
          <div class="sc-header">
            <div class="sc-header-left">
              <span class="sc-title">소비 기록</span>
              <span class="sc-count">6</span>
            </div>
            <a href="#" class="sc-more">더보기 ›</a>
          </div>
          <hr class="sc-divider">
          <div class="sc-items">
            <div class="sc-item"><span>☕ 스타벅스</span><span>6,100원</span></div>
            <div class="sc-item"><span>🍲 용가훠궈</span><span>18,900원</span></div>
            <div class="sc-item"><span>💳 넷플릭스</span><span>6,750원</span></div>
          </div>
        </div>

        <!-- 카드 2 -->
        <div class="spending-card">
          <div class="sc-header">
            <div class="sc-header-left">
              <span class="sc-title">소비 기록</span>
              <span class="sc-count">4</span>
            </div>
            <a href="#" class="sc-more">더보기 ›</a>
          </div>
          <hr class="sc-divider">
          <div class="sc-items">
            <div class="sc-item"><span>🎤 노래방</span><span>10,000원</span></div>
            <div class="sc-item"><span>🍿 CGV</span><span>15,000원</span></div>
            <div class="sc-item"><span>📦 쿠팡</span><span>9,800원</span></div>
          </div>
        </div>

        <!-- 카드 3 -->
        <div class="spending-card">
          <div class="sc-header">
            <div class="sc-header-left">
              <span class="sc-title">소비 기록</span>
              <span class="sc-count">3</span>
            </div>
            <a href="#" class="sc-more">더보기 ›</a>
          </div>
          <hr class="sc-divider">
          <div class="sc-items">
            <div class="sc-item"><span>☕ 스타벅스</span><span>6,100원</span></div>
            <div class="sc-item"><span>🛍 무신사</span><span>62,280원</span></div>
            <div class="sc-item"><span>🎧 애플뮤직</span><span>8,900원</span></div>
          </div>
        </div>

      </div><!-- /spending-slider -->
    </div>

    <!-- ── 대화 상대 ── -->
    <div class="section-card members-card">
      <div class="section-header">
        <div class="section-header-left">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="14" fill="#F69A21"/>
            <circle cx="14" cy="10" r="4" fill="#fff"/>
            <path d="M6 22c0-4 3.6-7 8-7s8 3 8 7"
                  stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>
          </svg>
          <span class="section-title">대화 상대</span>
          <span class="member-count">83</span>
        </div>
      </div>

      <ul class="member-list" id="memberList">
        <!-- 지은 (나) -->
        <li class="member-item">
          <div class="member-avatar"></div>
          <div class="member-name-wrap">
            <span class="me-badge">나</span>
            <span class="member-name">지은</span>
          </div>
        </li>
        <li class="member-item">
          <div class="member-avatar"></div>
          <span class="member-name">라떼말고물</span>
        </li>
        <li class="member-item">
          <div class="member-avatar"></div>
          <span class="member-name">민지</span>
        </li>
        <li class="member-item">
          <div class="member-avatar"></div>
          <span class="member-name">텀블러쓰기3일차</span>
        </li>
        <li class="member-item">
          <div class="member-avatar"></div>
          <span class="member-name">하나</span>
        </li>
        <!-- 숨겨진 멤버 (더보기 클릭 시 노출) -->
        <li class="member-item hidden-member" style="display:none">
          <div class="member-avatar"></div>
          <span class="member-name">수지</span>
        </li>
        <li class="member-item hidden-member" style="display:none">
          <div class="member-avatar"></div>
          <span class="member-name">주은</span>
        </li>
        <li class="member-item hidden-member" style="display:none">
          <div class="member-avatar"></div>
          <span class="member-name">찬희</span>
        </li>
      </ul>

      <!-- 구분선 -->
      <hr class="member-divider">

      <!-- 더보기 버튼 -->
      <button class="more-btn" id="moreBtn" aria-expanded="false">
        <svg width="12" height="7" viewBox="0 0 12 7" fill="none"
             stroke="#686868" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 1 6 6 11 1"/>
        </svg>
        더보기
      </button>
    </div>

    <!-- ── 채팅방 나가기 ── -->
    <button class="leave-btn"
            onclick="if(confirm('채팅방을 나가시겠어요?')) location.href='chat.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="#D32424" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      채팅방 나가기
    </button>

    <div class="bottom-spacer"></div>

  </div><!-- /scroll-body -->

  <!-- 홈 인디케이터 -->
  <div class="home-indicator"></div>

</div><!-- /phone -->
<script src="setting-challenge.js"></script>
</body>
</html>
