<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOTIMO - 온보딩</title>
  <link rel="stylesheet" href="css/onboarding.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
<div class="phone">

  <!-- 상태바 -->
  <div class="status-bar">
    <span class="status-time">9:35</span>
    <svg class="bell-off" width="17" height="17" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      <path d="M18.63 13A17.89 17.89 0 0 1 18 8"/>
      <path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/>
      <path d="M18 8a6 6 0 0 0-9.33-5"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
  </div>

  <!-- 히어로 영역 (로고 / 일러스트 자리) -->
  <div class="hero">
    <p class="hero-logo">MOTIMO</p>
    <p class="hero-sub">소비를 줄이고, 목표를 이루세요</p>
  </div>

  <!-- 소셜 로그인 버튼 영역 -->
  <div class="login-buttons">

    <!-- 카카오 -->
    <button class="login-btn kakao">
      <svg class="btn-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 3C7.03 3 3 6.36 3 10.5c0 2.64 1.67 4.97 4.19 6.34l-.85 3.13a.3.3 0 0 0 .45.33L10.6 18.1A10.5 10.5 0 0 0 12 18c4.97 0 9-3.36 9-7.5S16.97 3 12 3z" fill="#000"/>
      </svg>
      <span>카카오로 3초만에 로그인</span>
    </button>

    <!-- 네이버 -->
    <button class="login-btn naver">
      <svg class="btn-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect width="24" height="24" rx="3" fill="#1EC800"/>
        <path d="M13.3 12.3L10.1 7H7v10h3.7V11.7L13.9 17H17V7h-3.7v5.3z" fill="#fff"/>
      </svg>
      <span>네이버로 로그인</span>
    </button>

    <!-- 애플 -->
    <button class="login-btn apple">
      <svg class="btn-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M17.05 12.54c-.03-2.55 2.08-3.78 2.17-3.84-1.18-1.73-3.02-1.96-3.68-1.99-1.57-.16-3.07.93-3.87.93-.8 0-2.03-.91-3.34-.88-1.72.03-3.31 1-4.19 2.54-1.79 3.11-.46 7.72 1.28 10.25.85 1.23 1.86 2.6 3.19 2.55 1.28-.05 1.77-.83 3.32-.83 1.55 0 1.99.83 3.35.8 1.38-.02 2.25-1.25 3.09-2.49.98-1.42 1.38-2.8 1.4-2.87-.03-.01-2.69-1.03-2.72-4.17zM14.5 4.89c.7-.86 1.18-2.04 1.05-3.23-.01 0-.01 0-.02 0-1.02.04-2.24.68-2.97 1.54-.65.75-1.22 1.96-1.07 3.12 1.13.09 2.29-.58 3.01-1.43z" fill="#fff"/>
      </svg>
      <span>Apple로 로그인</span>
    </button>

  </div>

  <!-- 이메일 링크 -->
  <div class="email-links">
    <a href="#">이메일 가입</a>
    <span class="divider">|</span>
    <a href="#">이메일 찾기</a>
    <span class="divider">|</span>
    <a href="#">비밀번호 찾기</a>
  </div>

  <!-- 홈 인디케이터 -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
