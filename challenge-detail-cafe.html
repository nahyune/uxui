<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- PWA: 홈 화면 추가 시 전체화면 실행 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MOTIMO">
  <link rel="apple-touch-icon" href="img/icon-180.png">
  <title>MOTIMO - 카페 금지 챌린지</title>
  <link rel="stylesheet" href="css/challenge-detail-cafe.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
<div class="phone">

  <!-- 고정 헤더 -->
  <div class="sticky-header">

    <!-- 상태바 -->
    <div class="status-bar">
      <span class="status-time">9:35</span>
      <svg class="status-bell" width="17" height="17" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        <path d="M18.63 13A17.89 17.89 0 0 1 18 8"/>
        <path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/>
        <path d="M18 8a6 6 0 0 0-9.33-5"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    </div>

    <!-- 네비 헤더 -->
    <div class="nav-header">
      <a href="challenge.html" class="back-btn" aria-label="뒤로가기">
        <svg width="10" height="18" viewBox="0 0 10 18" fill="none"
             stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 1 1 9 9 17"/>
        </svg>
      </a>
      <button class="share-btn" aria-label="공유">
        <svg width="18" height="22" viewBox="0 0 18 22" fill="none"
             stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10V18a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V10"/>
          <polyline points="12 5 9 2 6 5"/>
          <line x1="9" y1="2" x2="9" y2="14"/>
        </svg>
      </button>
    </div>

  </div><!-- /sticky-header -->

  <!-- 스크롤 영역 -->
  <div class="scroll-body">

    <!-- 히어로 이미지 -->
    <div class="hero-img"></div>

    <!-- ── 챌린지 정보 카드 ── -->
    <div class="info-card">
      <h1 class="challenge-title">카페 금지 챌린지 ☕</h1>
      <hr class="divider">
      <div class="info-rows">
        <div class="info-row">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="#686868" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span class="info-label">조건</span>
          <span class="info-value">1일 1회 소비 체크</span>
        </div>
        <div class="info-row">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="#686868" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span class="info-label">기간</span>
          <span class="info-value">26.04.06(월) ~ 04.27(월)</span>
          <span class="duration-badge">10일간</span>
        </div>
      </div>
      <div class="participant-badge">
        <svg width="15" height="13" viewBox="0 0 24 20" fill="none"
             stroke="#649900" stroke-width="2" stroke-linecap="round">
          <path d="M17 19v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 19v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        총 83명이 함께하고 있어요!
      </div>
    </div>

    <!-- ── 챌린지 소개 ── -->
    <div class="section-block">
      <h2 class="section-title">챌린지 소개</h2>
      <div class="text-card">
        <p class="intro-text">
          "출근길, 점심 후… 계속 생각나는 커피<br>
          오늘만 한 번 안 가보는 건 어때요?<br>
          하루가 쌓이면 습관이 달라져요 ☕"
        </p>
      </div>
    </div>

    <!-- ── 나의 참여도 ── -->
    <div class="section-block">
      <h2 class="section-title">나의 참여도</h2>
      <div class="progress-card">

        <!-- 원형 그래프 (SVG stroke-dasharray) -->
        <div class="donut-wrap">
          <svg class="donut-svg" viewBox="0 0 220 220" width="220" height="220"
               aria-label="70% 달성">
            <!-- 회색 배경 트랙 -->
            <circle class="donut-track"
                    cx="110" cy="110" r="90"
                    fill="none"
                    stroke="#DDDDDD"
                    stroke-width="28"/>
            <!--
              진행 원호 (Secondary #F69A21)
              둘레 = 2π × 90 ≈ 565.49
              70%  = 565.49 × 0.70 ≈ 395.84
              rotate(-90): 12시 방향 시작
            -->
            <circle class="donut-progress"
                    cx="110" cy="110" r="90"
                    fill="none"
                    stroke="#F69A21"
                    stroke-width="28"
                    stroke-linecap="round"
                    stroke-dasharray="395.84 565.49"
                    stroke-dashoffset="0"
                    transform="rotate(-90 110 110)"/>
          </svg>
          <!-- 중앙 텍스트 (SVG 위에 절대 위치) -->
          <span class="donut-pct">70%</span>
        </div>

        <!-- 동기부여 문구 -->
        <p class="motivation-text">🔥 오늘 소비체크하면 80% 달성!</p>

        <!-- 나의 소비 체크 행 -->
        <div class="check-row">
          <div class="check-row-left">
            <!-- Primary 원형 아이콘 (Figma: Group2450, 28px) -->
            <div class="check-icon">
              <!-- database-check 스타일: 원통형 저장소 + 체크 -->
              <svg width="14" height="14" viewBox="0 0 20 20" fill="none"
                   stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <!-- 원통 상단 타원 -->
                <ellipse cx="10" cy="5" rx="6" ry="2.5"/>
                <!-- 원통 몸통 -->
                <path d="M4 5v5c0 1.38 2.69 2.5 6 2.5s6-1.12 6-2.5V5"/>
                <!-- 체크 마크 -->
                <polyline points="7.5 9.5 9.5 11.5 13.5 7.5"/>
              </svg>
            </div>
            <span class="check-label">나의 소비 체크</span>
          </div>
          <div class="check-row-right">
            <span class="check-count">
              <span class="count-done">7</span><span class="count-total">/10</span>
            </span>
            <span class="count-suffix">완료</span>
          </div>
        </div>

      </div><!-- /progress-card -->
    </div>

    <!-- CTA 높이만큼 여백 -->
    <div class="cta-spacer"></div>

  </div><!-- /scroll-body -->

  <!-- 고정 하단 CTA -->
  <div class="cta-area">
    <div class="cta-btn-done">챌린지 참여 완료</div>
    <div class="home-indicator"></div>
  </div>

</div><!-- /phone -->
</body>
</html>
