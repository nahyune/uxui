<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- PWA: 홈 화면 추가 시 전체화면 실행 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MOTIMO">
  <link rel="apple-touch-icon" href="img/icon-180.png">
  <title>MOTIMO - 랭킹</title>
  <link rel="stylesheet" href="css/ranking.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
<div class="phone">

  <!-- ── 헤더 ── -->
  <div class="top-header">
    <div class="status-bar"></div>
    <div class="header-nav">
      <div class="header-left">
        <a href="chatting-challenge.html" class="back-btn" aria-label="뒤로가기">
          <svg width="10" height="18" viewBox="0 0 10 18" fill="none"
               stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 1 1 9 9 17"/>
          </svg>
        </a>
        <span class="page-title">랭킹</span>
      </div>
    </div>
  </div>

  <!-- ── 스크롤 영역 ── -->
  <div class="scroll-body">

    <!-- ── 이번 주 소비 체크 카드 ── -->
    <div class="rk-card">

      <h2 class="card-title">이번 주 소비 체크</h2>

      <!-- 요일 체크 행 -->
      <div class="day-row">

        <!-- 월: 체크 완료 -->
        <div class="day-col">
          <span class="day-label">월</span>
          <div class="day-circle day-check">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                 stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
        </div>

        <!-- 화: X (실패) -->
        <div class="day-col">
          <span class="day-label">화</span>
          <div class="day-circle day-fail">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="#E53935" stroke-width="2.8" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </div>
        </div>

        <!-- 수: 체크 완료 -->
        <div class="day-col">
          <span class="day-label">수</span>
          <div class="day-circle day-check">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                 stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
        </div>

        <!-- 목: 체크 완료 -->
        <div class="day-col">
          <span class="day-label">목</span>
          <div class="day-circle day-check">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                 stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
        </div>

        <!-- 금: 오늘 (점선 Primary 빈 원) -->
        <div class="day-col">
          <span class="day-label day-label-today">금</span>
          <div class="day-circle day-today"></div>
        </div>

        <!-- 토: 미래 (회색 빈 원) -->
        <div class="day-col">
          <span class="day-label">토</span>
          <div class="day-circle day-empty"></div>
        </div>

        <!-- 일: 미래 (회색 빈 원) -->
        <div class="day-col">
          <span class="day-label">일</span>
          <div class="day-circle day-empty"></div>
        </div>

      </div><!-- /day-row -->

      <!-- 목표 달성률 -->
      <div class="progress-section">
        <div class="progress-meta">
          <span class="progress-label">목표까지</span>
          <span class="progress-pct">72%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width: 72%"></div>
        </div>
        <div class="progress-detail">
          <span class="detail-left">아낀 금액 <strong>36,000원</strong></span>
          <span class="detail-right">50,000원</span>
        </div>
      </div>

    </div><!-- /rk-card -->

    <!-- ── 전체 랭킹 카드 ── -->
    <div class="rk-card">

      <h2 class="card-title">전체 랭킹</h2>

      <ul class="rank-list">

        <!-- 1위 -->
        <li class="rank-row rank-first">
          <div class="rank-badge-wrap">
            <!-- 별 모양 1위 아이콘 -->
            <div class="star-badge">
              <svg width="46" height="44" viewBox="0 0 46 44" fill="#F69A21">
                <path d="M23 2l5.09 10.26L40 14.14l-8.5 8.28 2.01 11.69L23 28.77l-10.51 5.34L14.5 22.42 6 14.14l11.91-1.88L23 2z"/>
              </svg>
              <span class="star-num">1</span>
            </div>
          </div>
          <div class="rank-user">
            <div class="rank-avatar"></div>
            <span class="rank-name">하나</span>
          </div>
        </li>

        <!-- 2위 -->
        <li class="rank-row">
          <div class="rank-num-wrap"><span class="rank-num">2</span></div>
          <div class="rank-user">
            <div class="rank-avatar"></div>
            <span class="rank-name">텀블러쓰기3일차</span>
          </div>
        </li>

        <!-- 공동 2위 -->
        <li class="rank-row">
          <div class="rank-num-wrap"><span class="rank-num">2</span></div>
          <div class="rank-user">
            <div class="rank-avatar"></div>
            <span class="rank-name">민지</span>
          </div>
        </li>

        <!-- 공동 2위 (나) -->
        <li class="rank-row rank-me">
          <div class="rank-num-wrap"><span class="rank-num">2</span></div>
          <div class="rank-user">
            <div class="rank-avatar"></div>
            <div class="rank-name-wrap">
              <span class="me-badge">나</span>
              <span class="rank-name">지은</span>
            </div>
          </div>
        </li>

        <!-- 공동 2위 -->
        <li class="rank-row">
          <div class="rank-num-wrap"><span class="rank-num">2</span></div>
          <div class="rank-user">
            <div class="rank-avatar"></div>
            <span class="rank-name">라떼말고물</span>
          </div>
        </li>

      </ul>

      <!-- 전체보기 -->
      <div class="view-all">
        <svg width="12" height="7" viewBox="0 0 12 7" fill="none"
             stroke="#686868" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 1 6 6 11 1"/>
        </svg>
        전체보기
      </div>

    </div><!-- /rk-card -->

    <div class="bottom-spacer"></div>

  </div><!-- /scroll-body -->

  <!-- 홈 인디케이터 -->
  <div class="home-indicator"></div>

</div><!-- /phone -->
</body>
</html>
