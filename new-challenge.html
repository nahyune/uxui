<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- PWA: 홈 화면 추가 시 전체화면 실행 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MOTIMO">
  <link rel="apple-touch-icon" href="img/icon-180.png">
  <title>MOTIMO - 새 챌린지 만들기</title>
  <link rel="stylesheet" href="css/new-challenge.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
<div class="phone">

  <!-- ── 헤더 ── -->
  <div class="top-header">
    <div class="status-bar"></div>
    <div class="header-nav">
      <a href="chatting-setting.html" class="back-btn" aria-label="뒤로가기">
        <svg width="10" height="18" viewBox="0 0 10 18" fill="none"
             stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 1 1 9 9 17"/>
        </svg>
      </a>
    </div>
  </div>

  <!-- ── 스크롤 영역 ── -->
  <div class="scroll-body">

    <!-- ── 메인 입력 카드 ── -->
    <div class="form-card">

      <!-- 카드 제목 -->
      <div class="card-title-row">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <path d="M12 2c-1.5 3-5 5-5 9a5 5 0 0 0 10 0c0-4-3.5-6-5-9z"
                fill="#F69A21" stroke="#F69A21" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 14c-1 1.5-2 2.5-2 3.5a2 2 0 0 0 4 0c0-1-.8-2-2-3.5z"
                fill="#fff" stroke="none"/>
        </svg>
        <span class="card-title">새 챌린지 만들기</span>
      </div>

      <!-- ── 카테고리 탭 ── -->
      <div class="cat-scroll" id="catScroll">
        <button class="cat-btn active" data-cat="전체">전체</button>
        <button class="cat-btn" data-cat="식비">식비</button>
        <button class="cat-btn" data-cat="교통">교통</button>
        <button class="cat-btn" data-cat="의료">의료</button>
        <button class="cat-btn" data-cat="쇼핑">쇼핑</button>
        <button class="cat-btn" data-cat="카페">카페</button>
        <button class="cat-btn" data-cat="여가">여가</button>
        <button class="cat-btn" data-cat="생활">생활</button>
        <button class="cat-btn" data-cat="기타">기타</button>
      </div>

      <!-- ── 입력 필드 ── -->
      <div class="fields">

        <!-- 챌린지 제목 -->
        <div class="field-group">
          <label class="field-label">챌린지 제목</label>
          <div class="field-input-wrap">
            <input type="text" class="field-input"
                   placeholder="챌린지 이름을 입력하세요"
                   maxlength="20" />
          </div>
        </div>

        <!-- 목표 금액 -->
        <div class="field-group">
          <label class="field-label">목표 금액</label>
          <div class="field-input-wrap">
            <input type="number" class="field-input"
                   placeholder="1,000원 단위로 입력 가능"
                   min="1000" step="1000" />
          </div>
        </div>

        <!-- 기간 -->
        <div class="field-group">
          <label class="field-label">기간</label>
          <div class="date-row">
            <div class="date-field">
              <input type="text" class="date-input" id="startDate"
                     placeholder="시작일" readonly />
              <button class="cal-btn" aria-label="시작일 선택" onclick="document.getElementById('startDatePicker').showPicker && document.getElementById('startDatePicker').showPicker(); document.getElementById('startDatePicker').click()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                     stroke="#AFAFAF" stroke-width="2" stroke-linecap="round">
                  <rect x="3" y="4" width="18" height="18" rx="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
              </button>
              <input type="date" id="startDatePicker" class="hidden-picker"
                     onchange="syncDate('startDatePicker','startDate')" />
            </div>
            <div class="date-field">
              <input type="text" class="date-input" id="endDate"
                     placeholder="종료일" readonly />
              <button class="cal-btn" aria-label="종료일 선택" onclick="document.getElementById('endDatePicker').showPicker && document.getElementById('endDatePicker').showPicker(); document.getElementById('endDatePicker').click()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                     stroke="#AFAFAF" stroke-width="2" stroke-linecap="round">
                  <rect x="3" y="4" width="18" height="18" rx="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
              </button>
              <input type="date" id="endDatePicker" class="hidden-picker"
                     onchange="syncDate('endDatePicker','endDate')" />
            </div>
          </div>
        </div>

        <!-- 챌린지 소개 -->
        <div class="field-group">
          <label class="field-label">챌린지 소개</label>
          <div class="field-input-wrap">
            <input type="text" class="field-input"
                   placeholder="챌린지를 소개해주세요"
                   maxlength="200" />
          </div>
        </div>

      </div><!-- /fields -->

    </div><!-- /form-card -->

    <!-- 하단 여백 (CTA 버튼 높이만큼) -->
    <div class="bottom-gap"></div>

  </div><!-- /scroll-body -->

  <!-- ── CTA 버튼 ── -->
  <div class="cta-area">
    <button class="cta-btn" id="submitBtn" type="button">챌린지 시작하기</button>
    <div class="home-indicator"></div>
  </div>

</div><!-- /phone -->
<script src="new-challenge.js"></script>
</body>
</html>
