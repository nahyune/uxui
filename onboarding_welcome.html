<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- PWA: 홈 화면 추가 시 전체화면 실행 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MOA">
  <link rel="apple-touch-icon" href="img/icon-180.png">
  <title>MOA - 환영합니다</title>
  <link rel="stylesheet" href="css/onboarding_welcome.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
<div class="phone">

  <!-- 상태 여백 -->
  <div class="status-bar"></div>

  <!-- 헤드라인 -->
  <h1 class="headline">가입을 환영합니다!</h1>

  <!-- 이미지 영역 (컨페티 배경 + 고양이) -->
  <div class="image-area">
    <!-- 컨페티 배경: img/onboarding_welcome_bg.png 삽입 예정 -->
    <div class="confetti-placeholder"></div>
    <!-- 고양이: img/onboarding_welcome_cat.png 삽입 예정 -->
    <div class="cat-placeholder"></div>
  </div>

  <!-- 하단 CTA -->
  <div class="cta-area">
    <a href="home.html" class="cta-btn">홈으로</a>
  </div>

  <!-- 홈 인디케이터 -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
