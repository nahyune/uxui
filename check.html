<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MOTIMO">
  <link rel="apple-touch-icon" href="img/icon-180.png">
  <title>MOTIMO - 소비체크</title>
  <link rel="stylesheet" href="css/check.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
<div class="phone">

  <!-- ── 헤더 ── -->
  <div class="top-frame">
    <div class="status-bar"></div>
    <div class="page-header">
      <h1 class="page-title">소비체크</h1>
    </div>
  </div>

  <!-- ── 메인 스크롤 ── -->
  <main class="main-scroll">

    <!-- 오늘의 소비 카드 -->
    <section class="today-card">
      <p class="today-label">오늘의 소비</p>
      <div class="today-content">
        <p class="today-amount">118,830원</p>
        <span class="today-badge">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="#E16500" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/>
            <polyline points="17 18 23 18 23 12"/>
          </svg>
          훌륭해요! 예산보다 5% 절약 중
        </span>
      </div>
    </section>

    <!-- 소비 올리기 버튼 -->
    <a href="add-spending.html" class="upload-btn">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <circle cx="13" cy="13" r="13" fill="white"/>
        <line x1="13" y1="8.667" x2="13" y2="17.333" stroke="black" stroke-width="2" stroke-linecap="round"/>
        <line x1="8.667" y1="13" x2="17.333" y2="13" stroke="black" stroke-width="2" stroke-linecap="round"/>
      </svg>
      소비 올리기
    </a>

    <!-- 소비 통계 카드 -->
    <section class="stats-card">
      <div class="card-header">
        <span class="card-title">소비 통계</span>
        <a href="#" class="more-link">
          더보기
          <svg width="6" height="11" viewBox="0 0 6 11" fill="none">
            <path d="M1 1L5 5.5L1 10" stroke="#AFAFAF" stroke-width="1.8"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>

      <div class="stats-body">

        <!-- 식비 -->
        <div class="stat-row">
          <img src="img/check_food.png" class="stat-icon" alt="식비">
          <div class="stat-body">
            <div class="stat-name-row">
              <span class="stat-name">식비</span>
              <span class="stat-percent">45%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:45%"></div></div>
          </div>
        </div>

        <!-- 교통 -->
        <div class="stat-row">
          <img src="img/check_bus.png" class="stat-icon" alt="교통">
          <div class="stat-body">
            <div class="stat-name-row">
              <span class="stat-name">교통</span>
              <span class="stat-percent">30%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:30%"></div></div>
          </div>
        </div>

        <!-- 의료 -->
        <div class="stat-row">
          <img src="img/check_medical.png" class="stat-icon" alt="의료">
          <div class="stat-body">
            <div class="stat-name-row">
              <span class="stat-name">의료</span>
              <span class="stat-percent">25%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:25%"></div></div>
          </div>
        </div>

        <!-- 쇼핑 -->
        <div class="stat-row">
          <img src="img/check_shop.png" class="stat-icon" alt="쇼핑">
          <div class="stat-body">
            <div class="stat-name-row">
              <span class="stat-name">쇼핑</span>
              <span class="stat-percent">15%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:15%"></div></div>
          </div>
        </div>

      </div><!-- /stats-body -->
    </section>

    <!-- 주간 리포트 카드 -->
    <section class="weekly-card">
      <div class="weekly-header">
        <p class="weekly-title">주간 리포트</p>
        <p class="weekly-sub">최근 7일 소비 패턴</p>
      </div>
      <div class="chart">
        <div class="bar-group">
          <div class="bar" style="height:80px"></div>
          <span class="day-label">월</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height:106px"></div>
          <span class="day-label">화</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height:145px"></div>
          <span class="day-label">수</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height:125px"></div>
          <span class="day-label">목</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height:158px"></div>
          <span class="day-label">금</span>
        </div>
        <div class="bar-group">
          <div class="bar bar-active" style="height:175px"></div>
          <span class="day-label">토</span>
        </div>
        <div class="bar-group">
          <div class="bar" style="height:109px"></div>
          <span class="day-label">일</span>
        </div>
      </div>
    </section>

  </main>

  <!-- ── 하단 네비게이션 ── -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <img src="img/home.png" class="nav-icon-home" alt="홈">
      <span>홈</span>
    </a>
    <a href="check.html" class="nav-item active">
      <img src="img/check_02.png" class="nav-icon-check" alt="소비체크">
      <span>소비체크</span>
    </a>
    <a href="challenge.html" class="nav-item">
      <img src="img/challenge.png" class="nav-icon-challenge" alt="챌린지">
      <span>챌린지</span>
    </a>
    <a href="chat.html" class="nav-item">
      <img src="img/chatting.png" class="nav-icon-chat" alt="채팅">
      <span>채팅</span>
    </a>
    <a href="my.html" class="nav-item">
      <img src="img/mypage.png" class="nav-icon-my" alt="마이">
      <span>마이</span>
    </a>
  </nav>

  <!-- iOS 홈 인디케이터 -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
