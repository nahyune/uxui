<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- PWA: 홈 화면 추가 시 전체화면 실행 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MOA">
  <link rel="apple-touch-icon" href="img/icon-180.png">
  <title>MOA - 마이페이지</title>
  <link rel="stylesheet" href="css/my.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>
<div class="phone">

  <!-- ── 헤더 프레임 ── -->
  <div class="top-frame">
    <div class="status-bar"></div>
    <div class="page-title-wrap">
      <h1 class="page-title">마이페이지</h1>
    </div>
  </div>

  <!-- ── 스크롤 영역 ── -->
  <main class="main-scroll">

    <!-- 프로필 영역 -->
    <div class="profile-wrap">
      <div class="profile-avatar">
        <img src="img/my_cat.png" alt="프로필">
      </div>
    </div>

    <!-- 절약 현황 카드 -->
    <div class="savings-stat-card">
      <div class="stat-item">
        <p class="stat-num">54,300<span class="stat-unit">원</span></p>
        <p class="stat-desc">이번 주 절약</p>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <p class="stat-num">3<span class="stat-unit">개</span></p>
        <p class="stat-desc">참여 챌린지</p>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <p class="stat-num">7<span class="stat-unit">일</span></p>
        <p class="stat-desc">절약 연속일</p>
      </div>
    </div>

    <!-- 메뉴 카드 -->
    <div class="menu-card">

      <a href="#" class="menu-item">
        <div class="menu-left">
          <img class="menu-icon" src="img/my_01.JPG" alt="나의 프로필">
          <span class="menu-text">나의 프로필</span>
        </div>
        <svg class="chevron" viewBox="0 0 7 14" fill="none"
             stroke="#959595" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 1 6 7 1 13"/>
        </svg>
      </a>

      <div class="menu-divider"></div>

      <a href="#" class="menu-item">
        <div class="menu-left">
          <img class="menu-icon" src="img/my_02.JPG" alt="소비 리스트">
          <span class="menu-text">소비 리스트</span>
        </div>
        <svg class="chevron" viewBox="0 0 7 14" fill="none"
             stroke="#959595" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 1 6 7 1 13"/>
        </svg>
      </a>

      <div class="menu-divider"></div>

      <a href="#" class="menu-item">
        <div class="menu-left">
          <img class="menu-icon" src="img/my_03.JPG" alt="친구 관리">
          <span class="menu-text">친구 관리</span>
        </div>
        <svg class="chevron" viewBox="0 0 7 14" fill="none"
             stroke="#959595" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 1 6 7 1 13"/>
        </svg>
      </a>

      <div class="menu-divider"></div>

      <a href="#" class="menu-item">
        <div class="menu-left">
          <img class="menu-icon" src="img/my_04.JPG" alt="1:1 고객문의">
          <span class="menu-text">1:1 고객문의</span>
        </div>
        <svg class="chevron" viewBox="0 0 7 14" fill="none"
             stroke="#959595" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 1 6 7 1 13"/>
        </svg>
      </a>

      <div class="menu-divider"></div>

      <a href="#" class="menu-item">
        <div class="menu-left">
          <img class="menu-icon" src="img/my_05.JPG" alt="알림 설정">
          <span class="menu-text">알림 설정</span>
        </div>
        <svg class="chevron" viewBox="0 0 7 14" fill="none"
             stroke="#959595" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 1 6 7 1 13"/>
        </svg>
      </a>

    </div><!-- /menu-card -->

    <!-- 하단 링크 -->
    <div class="sub-links">
      <a href="#" class="sub-link">신고하기</a>
      <a href="#" class="sub-link">로그아웃</a>
    </div>

  </main>

  <!-- ── 하단 네비게이션 ── -->
  <nav class="bottom-nav">

    <a href="home.html" class="nav-item">
      <span class="nav-icon-wrap">
        <img src="img/home.png" class="nav-icon-home" alt="홈">
      </span>
      <span class="nav-label">홈</span>
    </a>
    <a href="check.html" class="nav-item">
      <span class="nav-icon-wrap">
        <img src="img/check.png" class="nav-icon-check" alt="소비체크">
      </span>
      <span class="nav-label">소비체크</span>
    </a>
    <a href="challenge.html" class="nav-item">
      <span class="nav-icon-wrap">
        <img src="img/challenge.png" class="nav-icon-challenge" alt="챌린지">
      </span>
      <span class="nav-label">챌린지</span>
    </a>
    <a href="chat.html" class="nav-item">
      <span class="nav-icon-wrap">
        <img src="img/chatting.png" class="nav-icon-chat" alt="채팅">
      </span>
      <span class="nav-label">채팅</span>
    </a>
    <a href="my.html" class="nav-item active">
      <span class="nav-icon-wrap">
        <img src="img/mypage_02.png" class="nav-icon-my" alt="마이">
      </span>
      <span class="nav-label">마이</span>
    </a>

  </nav>

  <!-- iOS 홈 인디케이터 -->
  <div class="home-indicator"></div>

</div>
</body>
</html>
